services:
  - type: web
    name: fake-review-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r src/api_requirements.txt
    startCommand: python src/api.py
    envVars:
      - key: PORT
        value: 5000
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: chrome-extension://YOUR_EXTENSION_ID,https://www.amazon.in,https://www.amazon.com,https://www.flipkart.com
      - key: FAKE_REVIEW_API_KEY
        sync: false
